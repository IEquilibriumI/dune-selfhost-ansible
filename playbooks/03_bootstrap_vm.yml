---
- name: Register Dune VM host
  hosts: localhost
  gather_facts: false

  vars_prompt:
    - name: vm_ip
      prompt: "Dune VM IP address"
      private: false

  tasks:
    - name: Add Dune VM to temporary inventory
      ansible.builtin.add_host:
        name: dunehost
        groups: dune_vm
        ansible_host: "{{ vm_ip }}"
        ansible_user: dune
        ansible_ssh_private_key_file: "{{ lookup('env', 'DUNE_SSH_PRIVATE_KEY_PATH') | default('~/.ssh/id_ed25519', true) }}"
        ansible_python_interpreter: /usr/bin/python3
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

- name: Bootstrap Dune VM
  hosts: dune_vm
  become: true
  gather_facts: false

  tasks:

    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init
      ansible.builtin.command: cloud-init status
      register: result
      until: "'done' in result.stdout"
      retries: 20
      delay: 5
      no_log: true
      failed_when: result.rc != 2
      changed_when: false

    - name: Gather facts after SSH becomes available
      ansible.builtin.setup:

    - name: Install Dune prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - tar
          - gzip
          - unzip
          - openssl
          - util-linux
          - iproute2
          - procps
          - lsb-release
          - sudo
          - python3
          - lib32gcc-s1
          - lib32stdc++6
          - qemu-guest-agent
          - nano
          - git
          - jq
          - htop
        state: present
      no_log: true
      environment:
        DEBIAN_FRONTEND: noninteractive
      become: true

    - name: Enable qemu guest agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Ensure dune service user exists
      ansible.builtin.user:
        name: dune
        shell: /bin/bash
        create_home: true
        state: present

    - name: Create Dune required directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: dune
        group: dune
        mode: "0755"
      loop:
        - /home/dune/.dune
        - /home/dune/.dune/download
        - /home/dune/Steam
        - /home/dune/.steam

    - name: Allow dune user passwordless sudo for vendor scripts
      ansible.builtin.copy:
        dest: /etc/sudoers.d/dune-server
        content: "dune ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
